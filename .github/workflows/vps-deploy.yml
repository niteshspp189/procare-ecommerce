name: Deploy to VPS (SSH)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-deploy:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check for deploy flag
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.head_commit.message }}" == *"--deploy=true"* ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

  deploy-vps:
    needs: check-deploy
    if: needs.check-deploy.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/procare-ecommerce

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Pruning unused Docker resources to free space..."
            docker system prune -f --volumes=false

            echo "==> Building and starting containers in production mode..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans

            echo "==> Waiting for backend health..."
            for i in $(seq 1 30); do
              if docker inspect --format='{{.State.Health.Status}}' procare_backend 2>/dev/null | grep -q "healthy"; then
                echo "Backend is healthy"
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 10
            done

            echo "==> Final container status:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
