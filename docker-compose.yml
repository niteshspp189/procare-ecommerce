services:
  postgres:
    image: postgres:15-alpine
    container_name: procare_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: procare_ecommerce
      POSTGRES_USER: procare_ecommerce
      POSTGRES_PASSWORD: procare_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - procare_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U procare_ecommerce -d procare_ecommerce" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: procare_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - procare_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: procare_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "9000"
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgres://procare_ecommerce:procare_ecommerce@postgres:5432/procare_ecommerce
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./backend/.env
    networks:
      - procare_network
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:9000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: 60s
      timeout: 30s
      retries: 8
      start_period: 300s

  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile
    container_name: procare_storefront
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "8000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://shop.mvshoecare.com
    env_file:
      - ./storefront/.env
    networks:
      - procare_network
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:8000/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))" ]
      interval: 20s
      timeout: 30s
      retries: 8
      start_period: 300s

  nginx:
    build:
      context: .
      dockerfile_inline: |
        FROM nginx:alpine
        COPY nginx.conf /etc/nginx/conf.d/default.conf
    container_name: procare_nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "9000:80"
    networks:
      procare_network:
        aliases:
          - shop.mvshoecare.com

networks:
  procare_network:
    driver: bridge

volumes:
  postgres_data:
