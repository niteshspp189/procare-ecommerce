services:
  backend:
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://propremiumcare:Mvsc2026%23%2356@database-1.c5wkcis2qg1p.ap-south-1.rds.amazonaws.com:5432/prepreimiumcare_ecommerce?ssl=true&sslmode=no-verify
      - REDIS_URL=redis://redis:6379
    volumes: []

  storefront:
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - MEDUSA_BACKEND_URL=http://procare_backend:9000
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=https://shop.mvshoecare.com
    volumes: []

  nginx:
    build:
      context: .
      dockerfile_inline: |
        FROM nginx:alpine
        COPY nginx.conf /etc/nginx/conf.d/default.conf
    volumes: []
    ports:
      - "9000:80"
