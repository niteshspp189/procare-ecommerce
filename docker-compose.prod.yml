services:
  backend:
    environment:
      - NODE_ENV=production

  storefront:
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=https://shop.mvshoecare.com

  nginx:
    ports:
      - "9000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
